
<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CONEM 2026 | A Revolução da Medicina</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #002846;
        color: #FFFFFF;
        overflow-x: hidden;
      }
      h1, h2, h3, .font-montserrat {
        font-family: 'Montserrat', sans-serif;
      }

      /* Glassmorphism de Altíssimo Padrão */
      .glass-premium {
        background: rgba(22, 96, 124, 0.12);
        backdrop-filter: blur(20px) saturate(160%);
        -webkit-backdrop-filter: blur(20px) saturate(160%);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
      }

      .glass-card {
        background: rgba(22, 96, 124, 0.2);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 147, 17, 0.15);
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }
      
      .glass-card:hover {
        background: rgba(22, 96, 124, 0.3);
        border-color: rgba(255, 147, 17, 0.4);
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
      }

      /* Efeitos de Glow */
      .glow-orange {
        box-shadow: 0 0 20px rgba(226, 49, 0, 0.3), 0 0 40px rgba(226, 49, 0, 0.1);
      }
      .glow-orange-hover:hover {
        box-shadow: 0 0 40px rgba(226, 49, 0, 0.6), 0 0 70px rgba(226, 49, 0, 0.2);
        transform: translateY(-4px);
      }

      .text-glow-gold {
        text-shadow: 0 0 15px rgba(255, 147, 17, 0.4);
      }

      /* Animações de Movimento */
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-15px); }
      }
      .animate-float {
        animation: float 6s ease-in-out infinite;
      }

      @keyframes pulse-glow {
        0%, 100% { box-shadow: 0 0 20px rgba(226, 49, 0, 0.4); }
        50% { box-shadow: 0 0 45px rgba(226, 49, 0, 0.7); }
      }
      .animate-pulse-cta {
        animation: pulse-glow 2.5s infinite ease-in-out;
      }

      @keyframes blob-move {
        0%, 100% { transform: translate(0, 0) scale(1); }
        33% { transform: translate(30px, -50px) scale(1.1); }
        66% { transform: translate(-20px, 20px) scale(0.9); }
      }
      .animate-blob {
        animation: blob-move 15s infinite alternate ease-in-out;
      }

      /* Reveal on Scroll */
      .reveal {
        opacity: 0;
        transform: translateY(30px);
        transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .reveal.active {
        opacity: 1;
        transform: translateY(0);
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #001a2e;
      }
      ::-webkit-scrollbar-thumb {
        background: #16607C;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #FF9311;
      }

      .sand-texture {
        background-image: url('https://www.transparenttextures.com/patterns/p6.png');
        opacity: 0.03;
      }

      /* Grain Overlay para Sofisticação */
      .grain {
        pointer-events: none;
        position: fixed;
        inset: -50%;
        width: 200%;
        height: 200%;
        background-image: url("https://grainy-gradients.vercel.app/noise.svg");
        opacity: 0.15;
        z-index: 9999;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",

}
</script>

</head>
